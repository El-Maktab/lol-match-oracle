[project]
name = "lol-match-oracle"
version = "0.1.0"
description = "uv venv --python 3.12Add your description here"
readme = "README.md"
authors = [
    { name = "amir-kedis", email = "amir.kedis@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "kaggle>=2.0.0",
    "python-dotenv>=1.0.1",
]

[dependency-groups]
dev = [
    "ruff",
]

[project.scripts]
oracle = "oracle:main"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "oracle"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
